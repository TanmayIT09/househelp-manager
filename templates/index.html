{% extends 'base.html' %}

{% block content %}
<h2>Helpers</h2>
<ul>
    {% for helper in helpers %}
    <li>
        <a href="{{ url_for('helper_detail', id=helper.id) }}">{{ helper.name }}</a> - {{ helper.type | title }}
        <a href="{{ url_for('edit_helper', id=helper.id) }}" style="margin-left: 10px; color: #007bff;">[Edit]</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
