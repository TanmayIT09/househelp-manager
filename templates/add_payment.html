{% extends 'base.html' %}

{% block content %}
<h2>Add Payment for {{ helper.name }} on {{ year }}-{{ '%02d'|format(month) }}-{{ '%02d'|format(day) }}</h2>
<form method="post">
    <label for="amount">Amount:</label>
    <input type="number" step="0.01" id="amount" name="amount" required><br>
    <button type="submit">Add</button>
</form>
{% endblock %}
